<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXコース 簿記実習アーカイブ</title>
<style>
  :root {
    --green-dark: #1a5c3a;
    --green-mid: #2d8a57;
    --green-light: #e8f5ee;
    --green-accent: #3cb371;
    --text-main: #1c2b22;
    --text-sub: #4a6b55;
    --border: #c2dece;
    --white: #ffffff;
    --gray-light: #f4f9f6;
    --yt-red: #c4302b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--gray-light);
    color: var(--text-main);
    min-height: 100vh;
  }

  header {
    background: var(--green-dark);
    color: var(--white);
    padding: 24px 32px 20px;
    border-bottom: 4px solid var(--green-accent);
  }

  header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.05em; }
  header p { font-size: 0.8rem; opacity: 0.65; margin-top: 4px; }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* リンクカード共通 */
  .link-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  /* YouTubeリンクカード */
  .yt-link {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    text-decoration: none;
    color: var(--text-main);
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(45,138,87,0.05);
  }

  .yt-link:hover {
    border-color: var(--green-accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(45,138,87,0.12);
  }

  .yt-icon {
    width: 32px;
    height: 32px;
    background: var(--yt-red);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .yt-icon svg { width: 18px; height: 18px; fill: var(--white); }

  .nlm-icon {
    width: 32px;
    height: 32px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    padding: 4px;
  }

  .yt-info { flex: 1; min-width: 0; }

  .yt-label {
    font-size: 0.7rem;
    color: var(--text-sub);
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }

  .yt-name {
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--green-dark);
  }

  .yt-arrow {
    color: var(--green-accent);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tab-btn {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-bottom: none;
    color: var(--text-sub);
    padding: 6px 14px;
    font-size: 0.78rem;
    font-family: inherit;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.4;
    min-width: 72px;
    text-align: center;
  }

  .tab-row1 { font-weight: 700; font-size: 0.8rem; }
  .tab-row2 { font-size: 0.72rem; opacity: 0.85; }

  .tab-btn:hover { background: var(--green-light); color: var(--green-dark); }

  .tab-btn.active {
    background: var(--white);
    color: var(--green-dark);
    font-weight: 700;
    position: relative;
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 2px;
    background: var(--white);
  }

  .panel-wrap {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 0 8px 8px 8px;
    padding: 32px 36px;
    box-shadow: 0 2px 12px rgba(45,138,87,0.06);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .lesson-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .date-badge {
    display: inline-block;
    background: var(--green-light);
    color: var(--green-dark);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .theme-badge {
    display: inline-block;
    background: var(--green-mid);
    color: var(--white);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .lesson-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .section-title {
    font-size: 1.0rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--green-light);
  }

  .purpose-list { list-style: none; margin-bottom: 28px; }

  .purpose-list li {
    padding: 5px 0 5px 20px;
    position: relative;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .purpose-list li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--green-accent);
    font-weight: 700;
  }

  .steps { display: flex; flex-direction: column; gap: 20px; }

  .step {
    border-left: 3px solid var(--green-accent);
    padding-left: 20px;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .step-num {
    background: var(--green-mid);
    color: var(--white);
    font-size: 0.72rem;
    font-weight: 700;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .step-label { font-size: 0.92rem; font-weight: 700; color: var(--green-dark); }
  .step-body { font-size: 0.87rem; color: var(--text-main); line-height: 1.75; }

  /* URLブロック */
  .url-block {
    background: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 10px 0;
  }

  .url-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 0;
  }

  .url-text {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.78rem;
    color: var(--text-sub);
    word-break: break-all;
    flex: 1;
  }

  .copy-btn {
    background: var(--green-light);
    border: 1px solid var(--border);
    color: var(--green-dark);
    font-size: 0.7rem;
    font-family: inherit;
    padding: 3px 9px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-weight: 600;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: var(--green-accent);
    color: var(--white);
    border-color: var(--green-accent);
  }

  .copy-btn.copied {
    background: var(--green-mid);
    color: var(--white);
    border-color: var(--green-mid);
  }

  /* プロンプトブロック */
  .prompt-wrap { position: relative; margin: 10px 0; }

  .prompt-block {
    background: var(--green-light);
    border-left: 4px solid var(--green-accent);
    border-radius: 0 6px 6px 0;
    padding: 12px 16px;
    font-size: 0.86rem;
    line-height: 1.7;
    color: var(--text-main);
  }

  .prompt-block-text { padding-right: 70px; }

  .prompt-copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--green-dark);
    font-size: 0.7rem;
    font-family: inherit;
    padding: 3px 9px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-weight: 600;
  }

  .prompt-copy-btn:hover {
    background: var(--green-accent);
    color: var(--white);
    border-color: var(--green-accent);
  }

  .prompt-copy-btn.copied {
    background: var(--green-mid);
    color: var(--white);
    border-color: var(--green-mid);
  }

  .hint-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-sub);
    margin-top: 14px;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  /* 追加指示リスト */
  .hint-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ステップ注意書き */
  .step-note {
    font-size: 0.82rem;
    color: var(--text-sub);
    background: #fffbea;
    border-left: 3px solid #f0c040;
    border-radius: 0 4px 4px 0;
    padding: 7px 12px;
    margin: 8px 0;
    line-height: 1.65;
  }

  /* ツールリンク */
  .tool-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 10px 0;
  }

  .tool-link {
    display: inline-block;
    background: var(--green-light);
    border: 1.5px solid var(--border);
    color: var(--green-dark);
    font-size: 0.83rem;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.15s;
  }

  .tool-link:hover {
    background: var(--green-accent);
    color: var(--white);
    border-color: var(--green-accent);
  }

  /* 事前準備リスト */
  .prep-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .prep-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .prep-check { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  .prep-body { flex: 1; }

  .prep-label {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 4px;
  }

  .prep-text {
    font-size: 0.85rem;
    color: var(--text-main);
    line-height: 1.65;
    margin-bottom: 4px;
  }

  /* prep参考動画リンク */
  .prep-link-wrap { margin-top: 6px; }

  .prep-link {
    font-size: 0.82rem;
    color: var(--green-dark);
    text-decoration: none;
    word-break: break-all;
    font-weight: 600;
  }

  .prep-link:hover { text-decoration: underline; }

  /* linkUrls（番号付きリンク） */
  .link-url-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 10px 0;
  }

  .link-url-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
  }

  .link-url-num {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--green-dark);
    min-width: 18px;
  }

  .link-url-a {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.78rem;
    color: var(--green-mid);
    text-decoration: none;
    word-break: break-all;
  }

  .link-url-a:hover { text-decoration: underline; }

  .hint-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: var(--gray-light);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .hint-text {
    font-size: 0.83rem;
    color: var(--text-sub);
    flex: 1;
    line-height: 1.5;
  }
</style>
</head>

// 互換性の高いコピー処理
function copyText(text) {
  return new Promise((resolve, reject) => {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(resolve).catch(() => fallback());
    } else {
      fallback();
    }
    function fallback() {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        ok ? resolve() : reject();
      } catch (e) { reject(e); }
    }
  });
}

function flashCopied(btn, originalText) {
  copyText(btn.dataset.copyText).then(() => {
    btn.textContent = "コピー済み";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = originalText;
      btn.classList.remove("copied");
    }, 1800);
  }).catch(() => {
    btn.textContent = "失敗";
    setTimeout(() => { btn.textContent = originalText; }, 1800);
  });
}

function escapeHTML(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function renderStepBody(step) {
  let html = `<div class="step-body">${step.body}</div>`;

  if (step.note) {
    html += `<div class="step-note">※ ${step.note}</div>`;
  }

  if (step.urls) {
    html += `<div class="url-block">`;
    step.urls.forEach(u => {
      html += `
        <div class="url-row">
          <span class="url-text">${u}</span>
          <button class="copy-btn" data-copy-text="${escapeHTML(u)}" data-original="コピー">コピー</button>
        </div>`;
    });
    html += `</div>`;
  }

  if (step.linkUrls) {
    html += `<div class="link-url-list">`;
    step.linkUrls.forEach((item, idx) => {
      html += `<div class="link-url-row"><span class="link-url-num">${item.label}</span><a class="link-url-a" href="${item.url}" target="_blank" rel="noopener">${item.url}</a></div>`;
    });
    html += `</div>`;
  }

  if (step.toolLinks) {
    html += `<div class="tool-links">`;
    step.toolLinks.forEach(t => {
      html += `<a class="tool-link" href="${t.url}" target="_blank" rel="noopener">${t.name} →</a>`;
    });
    html += `</div>`;
  }

  if (step.prompt) {
    html += `
      <div class="prompt-wrap">
        <div class="prompt-block">
          <div class="prompt-block-text">${step.prompt}</div>
        </div>
        <button class="prompt-copy-btn" data-copy-text="${escapeHTML(step.prompt)}" data-original="コピー">コピー</button>
      </div>`;
  }

  if (step.hints) {
    html += `<div class="hint-label">追加指示の例：</div><ul class="hint-list">`;
    step.hints.forEach(h => {
      html += `
        <li class="hint-row">
          <span class="hint-text">「${h}」</span>
          <button class="copy-btn" data-copy-text="${escapeHTML(h)}" data-original="コピー">コピー</button>
        </li>`;
    });
    html += `</ul>`;
  }

  return html;
}

function renderAll() {
  const tabsEl = document.getElementById("tabs");
  const panelsEl = document.getElementById("panels");

  lessons.forEach((lesson, i) => {
    const isActive = i === lessons.length - 1;

    const btn = document.createElement("button");
    btn.className = "tab-btn" + (isActive ? " active" : "");
    const [row1, row2] = lesson.label.split(/(?=前半|後半)/);
    btn.innerHTML = `<span class="tab-row1">${row1}</span><span class="tab-row2">${row2 || ''}</span>`;
    btn.dataset.index = i;
    btn.onclick = () => switchTab(i);
    tabsEl.appendChild(btn);

    const stepsHTML = lesson.steps.map(step => `
      <div class="step">
        <div class="step-header">
          <div class="step-num">${step.num}</div>
          <div class="step-label">${step.label}</div>
        </div>
        ${renderStepBody(step)}
      </div>`).join("");

    const purposeHTML = lesson.purpose.map(p => `<li>${p}</li>`).join("");

    let prepHTML = "";
    if (lesson.prep) {
      prepHTML = `<div class="section-title">🧰 事前準備</div><div class="prep-list">`;
      lesson.prep.forEach(p => {
        prepHTML += `<div class="prep-item"><div class="prep-check">✅</div><div class="prep-body"><div class="prep-label">${p.label}</div>`;
        if (p.body) prepHTML += `<div class="prep-text">${p.body}</div>`;
        if (p.url) prepHTML += `<div class="url-block"><div class="url-row"><span class="url-text">${p.url}</span><button class="copy-btn" data-copy-text="${p.url}" data-original="コピー">コピー</button></div></div>`;
        if (p.linkUrl) prepHTML += `<div class="prep-link-wrap"><a class="prep-link" href="${p.linkUrl}" target="_blank" rel="noopener">🎥 ${p.linkUrl} →</a></div>`;
        prepHTML += `</div></div>`;
      });
      prepHTML += `</div>`;
    }

    const flowLabel = lesson.sectionLabel || "実習の流れ";

    const panel = document.createElement("div");
    panel.className = "panel" + (isActive ? " active" : "");
    panel.dataset.index = i;
    const themeHTML = lesson.theme ? `<div class="theme-badge">研修内容：${lesson.theme}</div>` : "";

    panel.innerHTML = `
      <div class="lesson-meta">
        <div class="date-badge">${lesson.date}</div>
        ${themeHTML}
      </div>
      <div class="lesson-title">${lesson.title}</div>
      <div class="section-title">🎯 実習の目的</div>
      <ul class="purpose-list">${purposeHTML}</ul>
      ${prepHTML}
      <div class="section-title">💡 ${flowLabel}</div>
      <div class="steps">${stepsHTML}</div>
    `;
    panelsEl.appendChild(panel);
  });

  // コピーボタンのイベント委譲
  panelsEl.addEventListener("click", e => {
    const btn = e.target.closest(".copy-btn, .prompt-copy-btn");
    if (!btn) return;
    flashCopied(btn, btn.dataset.original);
  });
}

function switchTab(index) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.tab-btn[data-index="${index}"]`).classList.add("active");
  document.querySelector(`.panel[data-index="${index}"]`).classList.add("active");
}

renderAll();
